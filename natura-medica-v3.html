// System theme CSS (injected into <head> once)
function injectSystemThemeCSS() {
  if(document.getElementById("nm-sys-theme")) return;
  const s = document.createElement("style");
  s.id = "nm-sys-theme";
  s.textContent = `
    @media (prefers-color-scheme: dark) {
      :root {
        --sys-bg:#0e1117;--sys-bg2:#090d14;--sys-bg3:#131820;
        --sys-border:#1e2a3a;--sys-border2:#263444;
        --sys-text:#c0ccdc;--sys-text-bright:#d8e4f0;--sys-text-head:#a8bccc;
        --sys-text-dim:#4a607a;--sys-text-dimmer:#3a5068;
        --sys-accent:#5090d0;--sys-accent-dim:#3878b8;
        --sys-nav-active:#162030;--sys-user-msg:#0e1828;
        --sys-user-border:#182030;--sys-user-text:#8898c0;
        --sys-grad:radial-gradient(ellipse at 20% 50%,#101c2c,transparent 60%);
      }
    }
    @media (prefers-color-scheme: light) {
      :root {
        --sys-bg:#f4f6f8;--sys-bg2:#e8ecf0;--sys-bg3:#dde2e8;
        --sys-border:#b8c4d0;--sys-border2:#a8b4c0;
        --sys-text:#1a2430;--sys-text-bright:#0e1820;--sys-text-head:#2a3a50;
        --sys-text-dim:#607080;--sys-text-dimmer:#7a8898;
        --sys-accent:#2060b0;--sys-accent-dim:#104898;
        --sys-nav-active:#d0dce8;--sys-user-msg:#e0e8f4;
        --sys-user-border:#c0cce0;--sys-user-text:#1e2c40;
        --sys-grad:radial-gradient(ellipse at 20% 50%,#d8e4f0,transparent 60%);
      }
    }
  `;
  document.head.appendChild(s);
}

function applyTheme(themeId) {
  const theme = THEMES.find(t=>t.id===themeId) || THEMES[0];
  if(theme.system) injectSystemThemeCSS();
  const root = document.documentElement;
  Object.entries(theme.vars).forEach(([k,v]) => root.style.setProperty(k,v));

  // Light themes: set contrasting button text
  const lightThemes = ["salvia","rosa","nebbia","menta","ciliegio"];
  const isLight = lightThemes.includes(themeId);
  root.style.setProperty("--nm-btn-text", isLight ? "#fff" : "var(--nm-accent)");
  root.style.setProperty("--nm-btn-warn-bg",    isLight ? "#c87820" : "#3a2a0a");
  root.style.setProperty("--nm-btn-warn-border", isLight ? "#a06010" : "#6a4a0a");
  root.style.setProperty("--nm-btn-warn-text",   isLight ? "#fff" : "#c8983a");
  root.style.setProperty("--nm-btn-blue-bg",     isLight ? "#2858b0" : "#1a2a4a");
  root.style.setProperty("--nm-btn-blue-border", isLight ? "#1a48a0" : "#2a4a6a");
  root.style.setProperty("--nm-btn-blue-text",   isLight ? "#fff" : "#6a8aaa");
  root.style.setProperty("--nm-btn-danger-border", isLight ? "#c04040" : "#7a3a3a");
  root.style.setProperty("--nm-btn-danger-text",   isLight ? "#c03030" : "#c06060");
  // Textarea and input placeholder
  root.style.setProperty("--nm-placeholder", isLight ? "#9aaa96" : "#3a5a3a");
  try { localStorage.setItem("nm_theme", themeId); } catch (e2) {}
}

function getSavedTheme() {
  try { return localStorage.getItem("nm_theme") || "foresta"; } catch (e3) { return "foresta"; }
}

async function sb(path, method="GET", body=null) {
  const token = _jwt || SB_KEY;
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
    },
    body: body ? JSON.stringify(body) : null,
  });
  const text = await res.text();
  if (!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : [];
}

    method: "POST",

    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || JSON.stringify(data));
  return data;

// ── SANITIZZAZIONE TESTO PDF ─────────────────────────────────────
function sanitizePdfText(text) {
  // 1. Ricollega sillabazioni di fine riga: "antinfiam- matorio" → "antinfiammatorio"
  let t = text.replace(/(\w)-\s*\n\s*(\w)/g, "$1$2");
  // 2. Ricollega dosaggi spezzati a capo: "500\nmg" → "500 mg"
  t = t.replace(/(\d+)\s*\n\s*(mg|g|ml|gocce|compresse|cps|misurini|mcg|ui)\b/gi, "$1 $2");
  // 3. Rimuove numeri di pagina SOLO se esplicitamente marcati:
  //    "- 47 -", "— 47 —", "pag. 12", "pagina 12" — NON numeri isolati (potrebbero essere dosaggi)
  t = t.replace(/^\s*[-–—]\s*\d+\s*[-–—]\s*$/gm, "");
  t = t.replace(/^\s*pag(?:ina)?\.?\s*\d+\s*$/gim, "");
  // 4. Rimuove righe che si ripetono ≥ 3 volte (intestazioni/footer)
  const lines = t.split("\n");
  const freq = {};
  lines.forEach(l => { const s = l.trim(); if(s.length > 8) freq[s] = (freq[s]||0)+1; });
  t = lines.filter(l => (freq[l.trim()]||0) < 3).join("\n");
  // 5. Normalizza spazi multipli e righe vuote eccessive
  t = t.replace(/[ \t]{2,}/g, " ").replace(/\n{3,}/g, "\n\n");
  return t.trim();
}

const HEMO_STATUS = {
  "empty":    { color:"var(--nm-text-dimmer)", badge:"—",  bg:"transparent",          title:"Clicca per impostare lo stato" },
  "normal":   { color:"#4aaa4a",              badge:"✓",  bg:"transparent",          title:"Normale — clicca per cambiare" },
  "high":     { color:"#c8940a",              badge:"↑",  bg:"rgba(200,148,10,0.07)",title:"Alto — clicca per cambiare" },
  "critical": { color:"#cc5555",              badge:"⚠",  bg:"rgba(200,80,80,0.10)", title:"Critico — clicca per cambiare" },
  "low":      { color:"#c8940a",              badge:"↓",  bg:"rgba(200,148,10,0.07)",title:"Basso — clicca per cambiare" },
};

// Ciclo manuale badge: empty → normal → high → critical → low → empty
const HEMO_CYCLE = ["empty","normal","high","critical","low"];

function cycleHemoStatus(current) {
  const idx = HEMO_CYCLE.indexOf(current || "empty");
  return HEMO_CYCLE[(idx + 1) % HEMO_CYCLE.length];
}

// Prova l'auto-calcolo: se valore e range sono numerici semplici usa l'aritmetica,
// altrimenti ritorna "empty" così l'utente può impostare lo stato manualmente.
function getAutoStatus(p) {
  if (!p.value.trim()) return "empty";
  const v = parseFloat(p.value);
  if (isNaN(v)) return "empty"; // valore testuale → solo override manuale
  // Cerca "numero – numero" nel range (es. "12.0 – 17.5" o "70-100")
  const m = p.range.match(/([\d.]+)\s*[-–]\s*([\d.]+)/);
  if (!m) return "empty"; // range testuale → solo override manuale
  const rMin = parseFloat(m[1]), rMax = parseFloat(m[2]);
  const margin = (rMax - rMin) * 0.25;
  if (v < rMin - margin || v > rMax + margin) return "critical";
  if (v < rMin) return "low";
  if (v > rMax) return "high";
  return "normal";
}

// Stato effettivo: override manuale se impostato, altrimenti auto
function getParamStatus(p) {
  return p.statusOverride || getAutoStatus(p);
}
